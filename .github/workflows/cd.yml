name: CD

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  guest:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { guest_target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { guest_target: aarch64-unknown-linux-musl, os: ubuntu-24.04-arm }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.guest_target }}" }

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build bux-guest
        shell: bash
        run: |
          env_var="CARGO_TARGET_$(echo "${{ matrix.guest_target }}" | tr '[:lower:]-' '[:upper:]_')_LINKER"
          export "$env_var=musl-gcc"
          cargo build --release --target "${{ matrix.guest_target }}" -p bux-guest
          cp "target/${{ matrix.guest_target }}/release/bux-guest" "bux-guest-${{ matrix.guest_target }}"
          file "bux-guest-${{ matrix.guest_target }}"

      - uses: actions/upload-artifact@v7
        with:
          name: guest-${{ matrix.guest_target }}
          path: bux-guest-${{ matrix.guest_target }}

  build:
    needs: guest
    strategy:
      fail-fast: false
      matrix:
        include:
          # libkrun supports Linux (x86_64, aarch64) and macOS (aarch64) only.
          # Windows targets are excluded — libkrun has no Windows port.
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - {
              target: aarch64-unknown-linux-gnu,
              os: ubuntu-latest,
              cross: true,
            }
          - { target: aarch64-apple-darwin, os: macos-latest }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "${{ matrix.target }}" }
      - uses: actions/download-artifact@v8
        with:
          path: .guest
          pattern: guest-*
          merge-multiple: true

      # Cross-compile for Linux ARM64 on the x86_64 runner.
      # The Azure apt mirror lacks arm64 packages (actions/runner-images#10901),
      # so we add ports.ubuntu.com as a separate deb822 source.
      - name: Setup cross-compilation (Linux ARM64)
        if: matrix.cross
        run: |
          sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          printf '%s\n' \
            "Types: deb" \
            "URIs: http://ports.ubuntu.com/ubuntu-ports/" \
            "Suites: noble noble-updates noble-security" \
            "Components: main restricted universe multiverse" \
            "Architectures: arm64" \
            "Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg" \
            | sudo tee /etc/apt/sources.list.d/arm64-cross.sources
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libcap-ng-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - run: cargo build --release --target ${{ matrix.target }} -p bux-cli
        env:
          BUX_GUEST_DIR: ${{ github.workspace }}/.guest

      - name: Package
        shell: bash
        run: |
          bin="bux"
          ver="${GITHUB_REF_NAME#v}"
          [[ "$GITHUB_REF_NAME" == v* ]] || ver="0.0.0-dev"
          target="${{ matrix.target }}"
          staging="$bin-$ver-$target"

          case "$target" in
            x86_64-*) guest_target="x86_64-unknown-linux-musl" ;;
            aarch64-*) guest_target="aarch64-unknown-linux-musl" ;;
            *) guest_target="" ;;
          esac

          mkdir "$staging"
          cp "target/$target/release/$bin" LICENSE-MIT LICENSE-APACHE "$staging/"
          if [ -n "$guest_target" ]; then
            if [ -f "target/$target/release/bux-guest-$guest_target" ]; then
              cp "target/$target/release/bux-guest-$guest_target" "$staging/"
            elif [ -f ".guest/bux-guest-$guest_target" ]; then
              cp ".guest/bux-guest-$guest_target" "$staging/"
            fi
          fi

          tar czf "$staging.tar.gz" -C "$staging" .

          # SHA-256 checksum
          if command -v sha256sum &>/dev/null; then sha256sum "$staging.tar.gz" > "$staging.tar.gz.sha256"
          else shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"; fi

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: |
            bux-*.tar.gz
            bux-*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: actions/download-artifact@v8
        with: { merge-multiple: true }

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with: { args: "--latest --strip header" }

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            bux-*.tar.gz
            bux-*.sha256
            bux-guest-*
